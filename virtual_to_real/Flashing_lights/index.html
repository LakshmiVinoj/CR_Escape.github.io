<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashing Lights Sequence</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --off: #1f2937;
      --red: #ef4444;
      --blue: #3b82f6;
      --green: #22c55e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #1e293b 0%, var(--bg) 60%);
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      padding: 24px;
    }

    .panel {
      width: 100%;
      max-width: 1000px;
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: clamp(24px, 5vw, 60px);
      text-align: center;
      box-shadow: 0 18px 40px rgba(0,0,0,0.35);
    }

    .lights {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: clamp(30px, 6vw, 80px);
      margin: 28px 0 22px;
      flex-wrap: nowrap;
    }

    .light-wrap {
      display: grid;
      gap: 16px;
      justify-items: center;
      flex: 1;
    }

    .label {
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      font-size: clamp(1.2rem, 2.5vw, 2rem);
    }

    .light {
      width: min(30vw, 260px);
      height: min(30vw, 260px);
      border-radius: 50%;
      background: var(--off);
      border: 3px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 0 18px rgba(0,0,0,0.55);
      transition: background 0.35s ease, box-shadow 0.35s ease, transform 0.2s ease;
    }

    .light.on {
      transform: scale(1.04);
    }

    .light.red.on {
      background: var(--red);
      box-shadow:
        0 0 18px var(--red),
        0 0 36px rgba(239, 68, 68, 0.75),
        0 0 72px rgba(239, 68, 68, 0.45);
    }

    .light.blue.on {
      background: var(--blue);
      box-shadow:
        0 0 18px var(--blue),
        0 0 36px rgba(59, 130, 246, 0.75),
        0 0 72px rgba(59, 130, 246, 0.45);
    }

    .light.green.on {
      background: var(--green);
      box-shadow:
        0 0 18px var(--green),
        0 0 36px rgba(34, 197, 94, 0.75),
        0 0 72px rgba(34, 197, 94, 0.45);
    }

    @media (max-width: 900px) {
      .lights {
        gap: 24px;
      }

      .light {
        width: min(26vw, 220px);
        height: min(26vw, 220px);
      }
    }

    @media (max-width: 700px) {
      body {
        padding: 16px;
      }

      .panel {
        padding: 24px 16px;
      }

      .lights {
        gap: 18px;
      }

      .light {
        width: min(25vw, 180px);
        height: min(25vw, 180px);
      }

      .label {
        font-size: clamp(1rem, 2.2vw, 1.4rem);
      }
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="lights">
      <div class="light-wrap">
        <div id="redLight" class="light red"></div>
        <div class="label">Red</div>
      </div>
      <div class="light-wrap">
        <div id="blueLight" class="light blue"></div>
        <div class="label">Blue</div>
      </div>
      <div class="light-wrap">
        <div id="greenLight" class="light green"></div>
        <div class="label">Green</div>
      </div>
    </div>
  </div>

  <script>
    const redLight = document.getElementById("redLight");
    const blueLight = document.getElementById("blueLight");
    const greenLight = document.getElementById("greenLight");

    const flashOnTime = 650;
    const flashOffTime = 350;
    const groupPause = 700;

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function allOff() {
      redLight.classList.remove("on");
      blueLight.classList.remove("on");
      greenLight.classList.remove("on");
    }

    async function flash(lightEl, count) {
      for (let i = 1; i <= count; i++) {
        lightEl.classList.add("on");
        await wait(flashOnTime);
        lightEl.classList.remove("on");
        await wait(flashOffTime);
      }
    }

    async function runSequence() {
      while (true) {
        allOff();
        await flash(redLight, 4);
        await wait(groupPause);

        allOff();
        await flash(blueLight, 7);
        await wait(groupPause);

        allOff();
        await flash(greenLight, 6);
        await wait(groupPause);
      }
    }

    runSequence();
  </script>
</body>
</html>
